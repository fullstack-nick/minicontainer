name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        compiler: [gcc, clang]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install C dependencies
        run: sudo apt-get update && sudo apt-get install --yes libarchive-dev libssl-dev
      - name: Configure
        run: cmake --preset dev-${{ matrix.compiler }}
      - name: Build
        run: cmake --build --preset dev-${{ matrix.compiler }}
      - name: Test
        run: ctest --preset dev-${{ matrix.compiler }}
      - name: Privileged namespace and rootfs smoke
        if: matrix.compiler == 'gcc'
        run: |
          sudo useradd --system --home-dir /nonexistent --no-create-home --shell /usr/sbin/nologin minicontainer
          echo 'minicontainer:200000:65536' | sudo tee -a /etc/subuid /etc/subgid >/dev/null
          archive="$(bash scripts/fetch-alpine-rootfs.sh)"
          sudo bash tests/integration/test_runtime.sh \
            "$PWD/build/dev-gcc/minicontainer" \
            "$PWD/build/dev-gcc/minicontainer-shim" \
            "$archive"

  infrastructure:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.8
      - name: Format
        run: terraform fmt -check -recursive infra
      - name: Initialize without backend
        run: terraform -chdir=infra/terraform init -backend=false
      - name: Validate
        run: terraform -chdir=infra/terraform validate
      - name: Policy tests
        run: terraform -chdir=infra/terraform test
