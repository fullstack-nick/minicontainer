name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        compiler: [gcc, clang]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset dev-${{ matrix.compiler }}
      - name: Build
        run: cmake --build --preset dev-${{ matrix.compiler }}
      - name: Test
        run: ctest --preset dev-${{ matrix.compiler }}

