name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install C dependencies
        run: sudo apt-get update && sudo apt-get install --yes libarchive-dev libssl-dev libsystemd-dev
      - uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          queries: security-extended
      - name: Build
        run: |
          cmake --preset dev-gcc
          cmake --build --preset dev-gcc
      - uses: github/codeql-action/analyze@v4
